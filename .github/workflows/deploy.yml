name: Build and Push User Service to ACR

# Esto le dice a GitHub que ejecute el robot cada vez que hagas push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. El robot "descarga" el código
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. El robot usa los Secretos que creaste para entrar a Azure (South Central US)
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. El robot construye la imagen
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/ms-user-service:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/ms-user-service:latest .

    # 4. El robot empuja la imagen a Azure Container Registry
    - name: Push Docker Image to ACR
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ms-user-service:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/ms-user-service:latest
